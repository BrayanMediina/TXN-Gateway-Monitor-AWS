name: CI — Lint, Test, Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test-gateway:
    name: gateway-service — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/gateway-service/requirements-dev.txt

      - name: Install dependencies
        working-directory: services/gateway-service
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        working-directory: services/gateway-service
        run: ruff check src/ tests/ --select E,W,F,I,N,UP

      - name: Type check with mypy
        working-directory: services/gateway-service
        run: mypy src/ --ignore-missing-imports

      - name: Run tests with coverage
        working-directory: services/gateway-service
        run: |
          coverage run -m pytest tests/ -v
          coverage report --fail-under=85

  lint-and-test-lambdas:
    name: Lambdas — Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lambda: [txn_processor, dlq_handler, reconcile]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install boto3 pytest moto[sqs,sns,dynamodb] coverage ruff

      - name: Lint with ruff
        run: ruff check lambdas/${{ matrix.lambda }}/ --select E,W,F,I,N,UP

      - name: Run tests
        run: |
          coverage run -m pytest lambdas/${{ matrix.lambda }}/tests/ -v
          coverage report --fail-under=80

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t txn-gateway:${{ github.sha }} services/gateway-service/

      - name: Test container health
        run: |
          docker run -d --name gateway-test \
            -e AWS_REGION=us-east-1 \
            -e APP_ENV=test \
            -e SNS_GATEWAY_TOPIC_ARN=arn:aws:sns:us-east-1:000000000000:test \
            -e SNS_ALERTS_TOPIC_ARN=arn:aws:sns:us-east-1:000000000000:test \
            -e AWS_ACCESS_KEY_ID=test \
            -e AWS_SECRET_ACCESS_KEY=test \
            -p 8000:8000 \
            txn-gateway:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || (docker logs gateway-test && exit 1)
          docker stop gateway-test

  lint-frontend:
    name: Frontend — TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
