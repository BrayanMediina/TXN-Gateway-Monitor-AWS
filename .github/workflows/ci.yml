name: CI — Lint, Test, Build

on:
  pull_request:
    branches: [main]

jobs:
  # ── Gateway Service ──────────────────────────────────────────────────────────
  lint-and-test-gateway:
    name: gateway-service — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/gateway-service/requirements-dev.txt

      - name: Install dependencies
        working-directory: services/gateway-service
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Lint with ruff
        working-directory: services/gateway-service
        # BUG FIX: sin --select, pyproject.toml ya define los rules
        run: ruff check src/ tests/

      - name: Type check with mypy
        working-directory: services/gateway-service
        run: mypy src/ --ignore-missing-imports

      - name: Run tests with coverage
        working-directory: services/gateway-service
        # BUG FIX: conftest.py ya setea las vars de entorno para moto,
        # pero PYTHONPATH debe apuntar a src/ por si acaso pip install -e . falla
        env:
          PYTHONPATH: src
        run: |
          coverage run -m pytest tests/ -v
          coverage report --fail-under=85

  # ── Lambda Functions ─────────────────────────────────────────────────────────
  lint-and-test-lambdas:
    name: Lambdas — Lint & Test (${{ matrix.lambda }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lambda: [txn_processor, dlq_handler, reconcile]

    # BUG FIX: los handlers usan os.environ["AWS_REGION"] a nivel de módulo,
    # lo que causa KeyError al importar si la variable no está definida.
    # Se necesitan todas las vars que el handler lee en el top-level.
    env:
      AWS_DEFAULT_REGION: us-east-1
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      DYNAMODB_TABLE: txn-events-test
      SNS_ALERTS_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:test-alerts
      MAIN_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/000000000000/test-queue
      HIGH_VALUE_THRESHOLD: "50000"
      MAX_RETRIES: "3"
      PENDING_THRESHOLD_MINUTES: "10"
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          # BUG FIX: cache-dependency-path para key determinístico por lambda
          cache-dependency-path: lambdas/${{ matrix.lambda }}/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install boto3 pytest moto[sqs,sns,dynamodb] coverage ruff

      - name: Lint with ruff
        # BUG FIX: sin --select, deja que pyproject.toml o defaults de ruff apliquen
        run: ruff check lambdas/${{ matrix.lambda }}/

      - name: Run tests with coverage
        run: |
          coverage run -m pytest lambdas/${{ matrix.lambda }}/tests/ -v
          coverage report --fail-under=80

  # ── Docker Build ─────────────────────────────────────────────────────────────
  build-docker:
    name: Build & Smoke Test Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t txn-gateway:${{ github.sha }} services/gateway-service/

      - name: Smoke test — /health endpoint
        run: |
          docker run -d --name gateway-test \
            -e APP_ENV=test \
            -e AWS_DEFAULT_REGION=us-east-1 \
            -e AWS_REGION=us-east-1 \
            -e AWS_ACCESS_KEY_ID=testing \
            -e AWS_SECRET_ACCESS_KEY=testing \
            -e SNS_GATEWAY_TOPIC_ARN=arn:aws:sns:us-east-1:000000000000:test \
            -e SNS_ALERTS_TOPIC_ARN=arn:aws:sns:us-east-1:000000000000:test \
            -e DYNAMODB_TXN_TABLE=txn-events-test \
            -e DYNAMODB_METRICS_TABLE=gw-metrics-test \
            -p 8000:8000 \
            txn-gateway:${{ github.sha }}

          # BUG FIX: sleep 5 es muy poco para uvicorn + FastAPI (startup ~8-10s)
          echo "Esperando arranque del contenedor..."
          sleep 12

          curl -f http://localhost:8000/health \
            || (echo "=== LOGS ===" && docker logs gateway-test && exit 1)

          docker stop gateway-test

  # ── Frontend ─────────────────────────────────────────────────────────────────
  lint-frontend:
    name: Frontend — TypeScript & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          # BUG FIX: el cache de npm usa package-lock.json, no package.json.
          # Si no hay lockfile, genera uno con npm install primero y commitéalo.
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        # Usa npm ci cuando hay lockfile (reproducible). Si el lockfile no existe
        # en el repo, reemplaza por "npm install" y commitea el package-lock.json.
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
